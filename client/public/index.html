<!DOCTYPE html>
<html lang="zh-CN">

    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
      #loading .loader { width: 50px; height: 50px; border: 5px solid #e5e7eb; border-top: 5px solid #1677ff; border-radius: 50%; animation: spin 1s linear infinite; }

      #loading .text { margin-top: 20px; color: #6b7280; font-size: 14px; }
    </style>
  </head>

    <noscript>需要启用 JavaScript 才能运行此应用</noscript>
    <div id="root">

        <div style="text-align:center;">

        </div>
